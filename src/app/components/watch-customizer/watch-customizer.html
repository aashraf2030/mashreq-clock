<!-- Main Customizer Container -->
<div class="max-w-[480px] w-full min-h-screen bg-[#070708] border-x border-zinc-900/60 mx-auto shadow-2xl relative flex flex-col font-sans pb-10">

  <!-- Header -->
  <header class="w-full flex items-center justify-between px-4 py-3 sticky top-0 z-40 bg-[#070708]/80 backdrop-blur-md border-b border-zinc-900/40">
    <button (click)="goBack()" class="px-3 py-1 bg-[#121214] text-zinc-400 hover:text-zinc-200 text-xs font-bold rounded-full border border-zinc-800 transition-colors">
      ← الرئيسية
    </button>
    <div class="flex items-center">
      <img src="imgs/mashreq_logo_0ba61c5b_2e1aa377.png" alt="بنك المشرق" class="h-10 w-auto object-contain" />
    </div>
  </header>

  <!-- Title Section -->
  <section class="text-center px-6 mt-6">
    <h1 class="text-2xl font-extrabold text-white leading-snug drop-shadow-md">اختر لون ساعتك</h1>
    <p class="text-zinc-500 text-xs mt-1">جميع الساعات تحمل شعار بنك المشرق على الشاشة</p>
  </section>

  <!-- Active Large Watch Display -->
  <section class="px-4 my-4">
    <div class="w-full aspect-[4/3] rounded-3xl bg-radial from-[#181512] via-[#0b0a0a] to-[#070708] border border-amber-500/10 flex flex-col items-center justify-center p-6 relative overflow-hidden shadow-inner select-none transition-all duration-500">
      
      <!-- Radial background highlight glow -->
      <div class="absolute w-[60%] aspect-square rounded-full bg-gradient-to-tr from-amber-500/10 to-orange-500/5 blur-3xl -z-10"></div>
      
      <!-- Watch Image -->
      <div class="relative w-[45%] aspect-square flex items-center justify-center z-10">
        <img [src]="selectedWatch.image" [alt]="selectedWatch.colorLabel" 
             class="max-w-full max-h-full object-contain filter drop-shadow-[0_12px_24px_rgba(0,0,0,0.65)] transition-all duration-300 scale-105 animate-fade-in" />
      </div>

      <!-- Selected Color Name -->
      <span class="text-orange-500 font-bold text-sm mt-4 tracking-wide z-10">{{ selectedWatch.colorLabel }}</span>
    </div>
  </section>

  <!-- Big Confirmation CTA Button -->
  <section class="px-4 mb-6">
    <button (click)="confirmSelection()" class="w-full py-3.5 bg-gradient-to-r from-orange-600 to-amber-500 text-white font-bold text-base rounded-2xl shadow-xl shadow-orange-600/15 hover:shadow-orange-600/25 active:scale-[0.98] transition-all duration-300">
      تأكيد اختيار الساعة
    </button>
  </section>

  <!-- Color Choice Grid -->
  <section class="px-4">
    <div class="grid grid-cols-3 gap-3">
      @for (watch of watches; track watch.id; let idx = $index) {
        <button (click)="selectWatch(watch)" 
                class="flex flex-col items-center p-3 rounded-2xl bg-[#111113]/80 border-2 transition-all duration-300 group hover:bg-[#151517] cursor-pointer"
                [ngClass]="[
                  selectedWatch.id === watch.id ? 'border-orange-500 shadow-md shadow-orange-500/10 scale-[1.02]' : 'border-zinc-800/80 hover:border-zinc-700',
                  idx === 12 ? 'col-start-2' : ''
                ]">
          
          <!-- Thumbnail Image -->
          <div class="w-14 h-14 flex items-center justify-center p-1 rounded-xl bg-zinc-900 group-hover:scale-105 transition-transform duration-300">
            <img [src]="watch.image" [alt]="watch.colorLabel" class="max-w-full max-h-full object-contain" />
          </div>

          <!-- Color Label -->
          <span class="text-[10px] font-bold text-zinc-300 mt-2 text-center group-hover:text-white transition-colors">{{ watch.colorLabel }}</span>
        </button>
      }
    </div>
  </section>

</div>
